name: Build APK Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.25.2 gspread google-auth

      - name: Prepare assets
        run: |
          mkdir -p assets
          if [ -n "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > assets/credentials.json
          fi
          if [ -n "${{ secrets.GOOGLE_SHEET_ID }}" ]; then
            echo -n "${{ secrets.GOOGLE_SHEET_ID }}" > assets/sheet_id.txt
          fi
          ls -la assets/

      - name: Flet build apk
        run: |
          flutter config --no-analytics
          flet build apk --verbose --no-rich-output

      - name: List build output
        if: always()
        run: |
          echo "=== build/ ==="
          find build -type f -name "*.apk" 2>/dev/null || echo "Sem APKs"
          ls -la build/ 2>/dev/null || echo "Pasta build/ inexistente"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: metalotubo-apk
          path: build/apk/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/
            ~/.pub-cache/log
          if-no-files-found: ignore
          retention-days: 7

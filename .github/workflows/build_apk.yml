1. Nessa mesma página onde estás, clica no link azul "set up a workflow yourself →" (logo abaixo de "Get started with GitHub Actions")

2. Vais ver um editor de texto com um ficheiro main.yml. No topo, renomeia de main.yml para:

build_apk.yml
3. Apaga todo o conteúdo da caixa grande de texto (Ctrl+A → Delete)

4. Cola este conteúdo exato dentro da caixa:

name: Build APK Android

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: '12266719'

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.25.2 gspread google-auth

      - name: Prepare assets folder
        run: |
          mkdir -p assets
          if [ -n "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" ]; then
            echo "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > assets/credentials.json
            echo "credentials.json bundled do secret"
          fi
          if [ -n "${{ secrets.GOOGLE_SHEET_ID }}" ]; then
            echo -n "${{ secrets.GOOGLE_SHEET_ID }}" > assets/sheet_id.txt
          fi

      - name: Build APK
        run: |
          flet build apk --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: metalotubo-apk
          path: build/apk/*.apk
          if-no-files-found: error
          retention-days: 30
